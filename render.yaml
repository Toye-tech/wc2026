services:
  - type: web
    name: wc2026-tickets
    env: python
    plan: free
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn wc2026.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
